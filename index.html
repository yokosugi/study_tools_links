<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 教材リンク集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxpnH1EVG4NPKwF6RYEONlKLDnm-psRu8",
    authDomain: "study-tools-link.firebaseapp.com",
    databaseURL: "https://study-tools-link-default-rtdb.firebaseio.com",
    projectId: "study-tools-link",
    storageBucket: "study-tools-link.firebasestorage.app",
    messagingSenderId: "465773166187",
    appId: "1:465773166187:web:fcebf789e057a3be267b2e",
    measurementId: "G-6346MW19K8"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const DATA_REF = ref(db, 'links_v2');

    window._set = (data) => set(DATA_REF, data);

    function makeDefault() {
      const d = {};
      d.kokugo_tue = {};
      for (let i = 1; i <= 45; i++) d.kokugo_tue[i] = { category: '', links: [] };
      d.rika_thu = {};
      for (let i = 1; i <= 45; i++) d.rika_thu[i] = { category: '', links: [] };
      d.rika_sat = {};
      for (let i = 1; i <= 35; i++) d.rika_sat[i] = { category: '', links: [] };
      d.shakai_tue = {};
      for (let i = 1; i <= 45; i++) d.shakai_tue[i] = { category: '', links: [] };
      d.shakai_sat = {};
      for (let i = 1; i <= 35; i++) d.shakai_sat[i] = { category: '', links: [] };
      return d;
    }

    function normalizeData(raw) {
      const keys = ['kokugo_tue','rika_thu','rika_sat','shakai_tue','shakai_sat'];
      const out = {};
      keys.forEach(k => {
        out[k] = {};
        if (raw[k]) {
          Object.keys(raw[k]).forEach(i => {
            const n = parseInt(i);
            if (!isNaN(n)) {
              out[k][n] = raw[k][i];
              if (!out[k][n].links) out[k][n].links = [];
            }
          });
        }
      });
      return out;
    }

    // 初回：データがなければデフォルトを書き込む
    get(DATA_REF).then(snap => {
      if (!snap.exists()) {
        return set(DATA_REF, makeDefault());
      }
    }).catch(err => {
      console.error('初期データ書き込みエラー:', err);
    });

    // リアルタイム購読
    onValue(DATA_REF, (snap) => {
      const raw = snap.val();
      const data = normalizeData(raw || makeDefault());
      window._data = data;
      window._editData = JSON.parse(JSON.stringify(data));
      document.getElementById('loading').classList.add('hidden');
      setStatus('connected');
      if (window._currentView) window._currentView();
      else if (typeof renderDayView === 'function') renderDayView();
    }, (err) => {
      console.error('Firebase接続エラー:', err);
      setStatus('error');
      document.getElementById('loading').classList.add('hidden');
      // オフラインフォールバック
      const data = normalizeData(makeDefault());
      window._data = data;
      window._editData = JSON.parse(JSON.stringify(data));
      if (typeof renderDayView === 'function') renderDayView();
    });

  } catch(e) {
    console.error('Firebase初期化エラー:', e);
    document.getElementById('loading').classList.add('hidden');
    setStatus('error');
  }
</script>

<style>
:root {
  --bg: #f4f0e8;
  --surface: #fffdf8;
  --border: #ddd5c0;
  --text: #201c12;
  --muted: #8a7d65;
  --kokugo: #b5281e;
  --kokugo-l: #fdf0ee;
  --rika: #1a7040;
  --rika-l: #edf7f1;
  --shakai: #1a4e98;
  --shakai-l: #edf2fb;
  --accent: #e09018;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:500;transition:opacity .4s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* HEADER */
header{background:var(--surface);border-bottom:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;}
.logo{font-size:1.1rem;font-weight:900;letter-spacing:-.03em;display:flex;align-items:center;gap:6px;}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s;}
.status-dot.connected{background:#2ecc71;}
.status-dot.error{background:#e74c3c;}
.status-label{font-size:.72rem;color:var(--muted);}

/* TOP TABS (曜日 / カテゴリ / 編集) */
.top-tabs{display:flex;gap:4px;}
.ttab{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
.ttab.active{background:var(--text);color:#fff;border-color:var(--text);}
.ttab:hover:not(.active){background:var(--bg);color:var(--text);}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:24px 18px 80px;}

/* SECTION HEADERS */
.sec-title{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid;}
.sec-title.kokugo{color:var(--kokugo);border-color:var(--kokugo);}
.sec-title.rika{color:var(--rika);border-color:var(--rika);}
.sec-title.shakai{color:var(--shakai);border-color:var(--shakai);}
.sec-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;font-size:.85rem;font-weight:900;flex-shrink:0;}
.kokugo .sec-badge,.sec-badge.kokugo{background:var(--kokugo);color:#fff;}
.rika .sec-badge,.sec-badge.rika{background:var(--rika);color:#fff;}
.shakai .sec-badge,.sec-badge.shakai{background:var(--shakai);color:#fff;}
.day-badge{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;background:#f0ece0;color:var(--muted);}

/* ROUNDS GRID */
.rounds-wrap{margin-bottom:32px;}
.rounds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.round-card{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;transition:all .15s;cursor:default;}
.round-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.08);transform:translateY(-1px);}
.round-card.has-links{border-left-width:3px;}
.kokugo-card.has-links{border-left-color:var(--kokugo);}
.rika-card.has-links{border-left-color:var(--rika);}
.shakai-card.has-links{border-left-color:var(--shakai);}
.round-num{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.cat-pill{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:20px;background:#f0ece0;color:var(--muted);}
.cat-pill.知識{background:#fdf5e0;color:#9a6010;}
.cat-pill.漢字{background:#f5e8f5;color:#7a2a7a;}
.cat-pill.生物{background:#e8f5ee;color:#1a7040;}
.cat-pill.地学{background:#e8f0fa;color:#1a4e98;}
.cat-pill.物理{background:#fdf5e0;color:#9a6010;}
.cat-pill.化学{background:#f5e8f5;color:#7a2a7a;}
.cat-pill.公民{background:#e8f0fa;color:#1a4e98;}
.cat-pill.歴史{background:#fdf0ee;color:#b5281e;}
.cat-pill.地理{background:#e8f5ee;color:#1a7040;}
.link-list{display:flex;flex-direction:column;gap:4px;margin-top:5px;}
.link-item{display:flex;align-items:center;gap:5px;text-decoration:none;border-radius:5px;padding:4px 6px;font-size:.75rem;font-weight:500;line-height:1.3;transition:background .12s;}
.link-item.kokugo-lnk{color:var(--kokugo);background:var(--kokugo-l);}
.link-item.kokugo-lnk:hover{background:#f0c0bc;}
.link-item.rika-lnk{color:var(--rika);background:var(--rika-l);}
.link-item.rika-lnk:hover{background:#b8dfc8;}
.link-item.shakai-lnk{color:var(--shakai);background:var(--shakai-l);}
.link-item.shakai-lnk:hover{background:#b8c8e8;}
.empty-card{font-size:.72rem;color:#ccc;font-style:italic;}

/* CATEGORY VIEW */
.cat-section{margin-bottom:28px;}
.cat-header{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:700;margin-bottom:10px;padding:7px 12px;border-radius:8px;}
.cat-header.生物{background:#e8f5ee;color:#1a7040;}
.cat-header.地学{background:#e8f0fa;color:#1a4e98;}
.cat-header.物理{background:#fdf5e0;color:#9a6010;}
.cat-header.化学{background:#f5e8f5;color:#7a2a7a;}
.cat-header.知識{background:#fdf5e0;color:#9a6010;}
.cat-header.漢字{background:#f5e8f5;color:#7a2a7a;}
.cat-header.公民{background:#e8f0fa;color:#1a4e98;}
.cat-header.歴史{background:#fdf0ee;color:#b5281e;}
.cat-header.地理{background:#e8f5ee;color:#1a7040;}
.cat-header.未設定{background:#f0ece0;color:var(--muted);}

/* EDITOR */
.edit-section{margin-bottom:28px;}
.edit-round{border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.edit-round-header{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg);cursor:pointer;user-select:none;font-size:.85rem;font-weight:700;}
.edit-round-header:hover{background:#ede8dc;}
.edit-round-body{padding:12px 14px;display:none;border-top:1.5px solid var(--border);background:var(--surface);}
.edit-round-body.open{display:block;}
.cat-select{font-family:inherit;font-size:.82rem;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);margin-bottom:10px;cursor:pointer;}
.cat-select:focus{outline:none;border-color:var(--accent);}
.link-row{display:grid;grid-template-columns:1fr 1.5fr auto;gap:6px;align-items:center;margin-bottom:6px;}
input[type=text],input[type=url]{font-family:inherit;font-size:.8rem;padding:6px 9px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);width:100%;transition:border-color .15s;}
input:focus{outline:none;border-color:var(--accent);}
.btn-del{width:28px;height:28px;border:none;border-radius:6px;background:#fce8e8;color:#c0392b;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.btn-del:hover{background:#f5c6c6;}
.btn-add-link{font-family:inherit;font-size:.75rem;font-weight:600;padding:4px 10px;border-radius:6px;border:1.5px dashed var(--border);background:transparent;cursor:pointer;color:var(--muted);transition:all .12s;margin-top:2px;}
.btn-add-link:hover{border-color:var(--accent);color:var(--accent);background:#fdf8ef;}
.chevron{margin-left:auto;transition:transform .2s;color:var(--muted);}
.open .chevron{transform:rotate(180deg);}

/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(244,240,232,.96);backdrop-filter:blur(8px);border-top:1.5px solid var(--border);padding:12px 20px;display:none;justify-content:center;gap:10px;z-index:200;}
.save-bar.visible{display:flex;}
.btn-save{font-family:inherit;font-size:.92rem;font-weight:700;padding:10px 30px;border-radius:10px;border:none;background:var(--text);color:#fff;cursor:pointer;transition:all .15s;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.btn-save:hover{background:#111;transform:translateY(-1px);}
.btn-save:disabled{opacity:.6;cursor:default;transform:none;}
.btn-cancel{font-family:inherit;font-size:.85rem;font-weight:600;padding:10px 18px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--muted);transition:all .15s;}
.btn-cancel:hover{border-color:var(--text);color:var(--text);}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a7040;color:#fff;padding:9px 20px;border-radius:9px;font-size:.83rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SUB-TABS */
.sub-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;}
.stab{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:transparent;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;}
.stab.active{background:var(--text);color:#fff;border-color:var(--text);}
.stab:hover:not(.active){background:var(--bg);color:var(--text);}


/* PASSWORD MODAL */
.pw-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:center;justify-content:center;}
.pw-modal{background:#fffdf8;border-radius:16px;padding:28px 28px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);min-width:260px;}
.pw-modal-title{font-size:1rem;font-weight:700;}
.pw-modal-sub{font-size:.8rem;color:#8a7d65;margin-top:-8px;}
.pw-modal-row{display:flex;gap:8px;}
.pw-modal input{font-family:'Noto Sans JP',sans-serif;font-size:.95rem;padding:9px 13px;border:2px solid #ddd5c0;border-radius:9px;background:#f4f0e8;width:160px;outline:none;}
.pw-modal input:focus{border-color:#e09018;}
.pw-modal-btn{font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:700;padding:9px 16px;border-radius:9px;border:none;background:#201c12;color:white;cursor:pointer;}
.pw-modal-btn:hover{background:#000;}
.pw-modal-err{font-size:.78rem;color:#c0392b;display:none;}
.pw-modal-cancel{font-size:.78rem;color:#8a7d65;background:none;border:none;cursor:pointer;text-decoration:underline;}



/* TWO COLUMN LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.col-item{min-width:0;}
@media(max-width:700px){
  .two-col{grid-template-columns:1fr;}
}

/* ROUND GROUPS */
.round-group{margin-bottom:6px;}
.round-group-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;color:var(--muted);transition:all .15s;}
.round-group-header:hover{background:#ede8dc;color:var(--text);}
.round-group-header.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent;color:var(--text);}
.grp-chevron{font-size:.7rem;}
.round-group-body{display:none;border:1.5px solid var(--border);border-top:none;border-bottom-left-radius:8px;border-bottom-right-radius:8px;padding:10px;}
.round-group-body.open{display:block;}

@media(max-width:580px){
  .rounds-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));}
  .link-row{grid-template-columns:1fr auto;} 
  .link-row input[type=url]{grid-column:1;}
  .top-tabs{gap:3px;}
  .ttab{padding:5px 10px;font-size:.76rem;}
}
</style>
</head>

<script>
// ===== CONFIG =====
const KOKUGO_CATS = ['知識','漢字'];
const RIKA_CATS  = ['生物','地学','物理','化学'];
const SHAKAI_CATS = ['公民','歴史','地理'];

const DAY_GROUPS = [
  { label:'火曜日', items:[
    { key:'kokugo_tue', subject:'kokugo', name:'国語', max:45, hasCat:true, cats:KOKUGO_CATS },
    { key:'shakai_tue', subject:'shakai', name:'社会', max:45, hasCat:true, cats:SHAKAI_CATS },
  ]},
  { label:'木曜日', items:[
    { key:'rika_thu', subject:'rika', name:'理科', max:45, hasCat:true, cats:RIKA_CATS },
  ]},
  { label:'土曜日', items:[
    { key:'rika_sat', subject:'rika', name:'理科', max:35, hasCat:true, cats:RIKA_CATS },
    { key:'shakai_sat', subject:'shakai', name:'社会', max:35, hasCat:true, cats:SHAKAI_CATS },
  ]},
];

const ALL_ITEMS = DAY_GROUPS.flatMap(g => g.items.map(it => ({...it, dayLabel:g.label})));

let topView = 'day';
let dayTab  = 0; // 曜日インデックス
let catTab  = 'kokugo'; // kokugo / rika / shakai

// ===== STATUS =====
function setStatus(s) {
  document.getElementById('statusDot').className = 'status-dot ' + s;
  document.getElementById('statusLabel').textContent = s === 'connected' ? 'オンライン' : 'エラー';
}

// ===== ROUTER =====
function switchTop(view) {
  topView = view;
  document.querySelectorAll('.ttab').forEach((b,i) => b.classList.toggle('active', ['day','cat','edit'][i] === view));
  document.getElementById('saveBar').classList.toggle('visible', view === 'edit');
  if (view === 'day')  { 
function toggleGroup(id, btn) {
  const body = document.getElementById(id);
  const isOpen = body.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.querySelector('.grp-chevron').textContent = isOpen ? '▲' : '▼';
}

window._currentView = renderDayView;

// ===== LINK PASSWORD =====
let _pendingUrl = null;

function openLinkWithPw(url, e) {
  e.preventDefault();
  if (sessionStorage.getItem('auth') === '1') {
    window.open(url, '_blank', 'noopener');
    return;
  }
  _pendingUrl = url;
  document.getElementById('pwModal').style.display = 'flex';
  setTimeout(() => document.getElementById('pwModalInput').focus(), 50);
}

function submitPw() {
  const val = document.getElementById('pwModalInput').value;
  if (val === 'g') {
    sessionStorage.setItem('auth', '1');
    closePwModal();
    if (_pendingUrl) window.open(_pendingUrl, '_blank', 'noopener');
    _pendingUrl = null;
  } else {
    document.getElementById('pwModalErr').style.display = 'block';
    document.getElementById('pwModalInput').value = '';
    document.getElementById('pwModalInput').focus();
  }
}

function closePwModal() {
  document.getElementById('pwModal').style.display = 'none';
  document.getElementById('pwModalInput').value = '';
  document.getElementById('pwModalErr').style.display = 'none';
  _pendingUrl = null;
}
  renderDayView(); }
  if (view === 'cat')  { window._currentView = renderCatView;  renderCatView(); }
  if (view === 'edit') { window._currentView = renderEditView; renderEditView(); }
}

// ===== DAY VIEW =====
function renderDayView() {
  const data = window._data || {};
  const grp  = DAY_GROUPS[dayTab];
  let html = `<div class="sub-tabs">`;
  DAY_GROUPS.forEach((g,i) => {
    html += `<button class="stab${i===dayTab?' active':''}" onclick="dayTab=${i};renderDayView()">${g.label}</button>`;
  });
  html += `</div>`;

  // 2教科ある場合は横並び、1教科の場合は全幅
  const multiCol = grp.items.length > 1;
  if (multiCol) html += `<div class="two-col">`;

  grp.items.forEach(it => {
    html += `<div class="rounds-wrap${multiCol?' col-item':''}">
      <div class="sec-title ${it.subject}">
        <span class="sec-badge ${it.subject}">${it.subject==='kokugo'?'国':it.subject==='rika'?'理':'社'}</span>
        ${it.name} <span class="day-badge">${grp.label}</span>
      </div>`;

    const GROUP_SIZE = 4;
    const totalGroups = Math.ceil(it.max / GROUP_SIZE);
    const SHOW_DEFAULT = 3;

    for (let g = 0; g < totalGroups; g++) {
      const from = g * GROUP_SIZE + 1;
      const to   = Math.min((g + 1) * GROUP_SIZE, it.max);
      const isOpen = g < SHOW_DEFAULT;
      const groupId = `grp-${it.key}-${g}`;

      html += `<div class="round-group">
        <button class="round-group-header${isOpen?' open':''}" onclick="toggleGroup('${groupId}',this)">
          <span>第${from}回 〜 第${to}回</span>
          <span class="grp-chevron">${isOpen?'▲':'▼'}</span>
        </button>
        <div class="round-group-body${isOpen?' open':''}" id="${groupId}">
          <div class="rounds-grid">`;

      for (let n = from; n <= to; n++) {
        const row   = (data[it.key] && data[it.key][n]) || { links:[] };
        const links = row.links || [];
        const cat   = row.category || '';
        const hasL  = links.length > 0;
        html += `<div class="round-card ${it.subject}-card${hasL?' has-links':''}">
          <div class="round-num">第${n}回${cat ? `<span class="cat-pill ${cat}">${cat}</span>` : ''}</div>
          <div class="link-list">`;
        if (hasL) {
          links.forEach(lk => {
            html += `<a href="${escH(lk.url)}" onclick="openLinkWithPw('${escH(lk.url)}',event)" class="link-item ${it.subject}-lnk">
              ${getLinkIcon(lk.url)} <span>${escH(lk.label||lk.url)}</span></a>`;
          });
        } else {
          html += `<span class="empty-card">リンクなし</span>`;
        }
        html += `</div></div>`;
      }
      html += `</div></div></div>`;
    }
    html += `</div>`;
  });

  if (multiCol) html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

// ===== CAT VIEW =====
function renderCatView() {
  const data = window._data || {};
  let html = `<div class="sub-tabs">
    <button class="stab${catTab==='kokugo'?' active':''}" onclick="catTab='kokugo';renderCatView()">国語</button>
    <button class="stab${catTab==='rika'?' active':''}" onclick="catTab='rika';renderCatView()">理科</button>
    <button class="stab${catTab==='shakai'?' active':''}" onclick="catTab='shakai';renderCatView()">社会</button>
  </div>`;

  const cats   = catTab === 'rika' ? RIKA_CATS : catTab === 'shakai' ? SHAKAI_CATS : KOKUGO_CATS;
  const keys   = catTab === 'rika'
    ? [{key:'rika_thu',dayLabel:'木曜'},{key:'rika_sat',dayLabel:'土曜'}]
    : catTab === 'shakai'
    ? [{key:'shakai_tue',dayLabel:'火曜'},{key:'shakai_sat',dayLabel:'土曜'}]
    : [{key:'kokugo_tue',dayLabel:'火曜'}];
  const subj   = catTab === 'rika' ? 'rika' : catTab === 'shakai' ? 'shakai' : 'kokugo';
  const badge  = catTab === 'rika' ? '理' : catTab === 'shakai' ? '社' : '国';

  // カテゴリ別に集約
  const byCat = {};
  cats.forEach(c => byCat[c] = []);
  byCat['未設定'] = [];

  keys.forEach(({key, dayLabel}) => {
    const rows = data[key] || {};
    Object.keys(rows).forEach(n => {
      const row   = rows[n];
      const links = row.links || [];
      if (links.length === 0) return;
      const cat   = row.category || '未設定';
      if (!byCat[cat]) byCat[cat] = [];
      byCat[cat].push({ n: parseInt(n), dayLabel, links });
    });
  });

  [...cats, '未設定'].forEach(cat => {
    const entries = byCat[cat] || [];
    if (entries.length === 0) return;
    html += `<div class="cat-section">
      <div class="cat-header ${cat}">${cat} <span style="font-size:.75rem;font-weight:400;margin-left:4px;">(${entries.length}回)</span></div>
      <div class="rounds-grid">`;
    entries.sort((a,b) => a.n - b.n).forEach(({n, dayLabel, links}) => {
      html += `<div class="round-card ${subj}-card has-links">
        <div class="round-num">第${n}回 <span class="day-badge">${dayLabel}</span></div>
        <div class="link-list">`;
      links.forEach(lk => {
        html += `<a href="${escH(lk.url)}" onclick="openLinkWithPw('${escH(lk.url)}',event)" class="link-item ${subj}-lnk">
          ${getLinkIcon(lk.url)} <span>${escH(lk.label||lk.url)}</span></a>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('main').innerHTML = html;
}

// ===== EDIT VIEW =====
let editOpenState = {}; // 開閉状態保持

function renderEditView() {
  window._editData = deepClone(window._data || {});
  let html = '';

  DAY_GROUPS.forEach((grp, gi) => {
    html += `<div class="edit-section">
      <div class="sub-tabs" style="margin-bottom:10px">
        <span style="font-size:.82rem;font-weight:700;color:var(--muted);padding:5px 4px;">${grp.label}</span>
      </div>`;

    grp.items.forEach(it => {
      html += `<div style="margin-bottom:16px;">
        <div class="sec-title ${it.subject}" style="margin-bottom:10px;">
          <span class="sec-badge ${it.subject}">${it.subject==='kokugo'?'国':it.subject==='rika'?'理':'社'}</span>
          ${it.name}
        </div>`;

      for (let n = 1; n <= it.max; n++) {
        const stateKey = `${it.key}-${n}`;
        const isOpen   = !!editOpenState[stateKey];
        const row   = (window._editData[it.key] && window._editData[it.key][n]) || { links:[] };
        const links = row.links || [];
        const cat   = row.category || '';
        const hasL  = links.length > 0;

        html += `<div class="edit-round">
          <div class="edit-round-header" onclick="toggleEditRound('${stateKey}', this)">
            <span style="font-size:.78rem;color:var(--muted)">第</span>
            <span style="font-weight:700">${n}</span>
            <span style="font-size:.78rem;color:var(--muted)">回</span>`;
        if (cat) html += `<span class="cat-pill ${cat}">${cat}</span>`;
        if (hasL) html += `<span style="font-size:.72rem;color:var(--muted);margin-left:4px;">🔗${links.length}</span>`;
        html += `<span class="chevron${isOpen?' open':''}">▾</span></div>
          <div class="edit-round-body${isOpen?' open':''}" id="erb-${stateKey}">`;

        if (it.hasCat) {
          html += `<select class="cat-select" onchange="setCat('${it.key}',${n},this.value)">
            <option value="">カテゴリ未設定</option>`;
          it.cats.forEach(c => html += `<option value="${c}"${cat===c?' selected':''}>${c}</option>`);
          html += `</select>`;
        }

        html += `<div id="links-edit-${it.key}-${n}">`;
        links.forEach((lk, li) => { html += renderLinkRowEdit(it.key, n, li, lk); });
        html += `</div>
          <button class="btn-add-link" onclick="addLinkEdit('${it.key}',${n})">＋ リンクを追加</button>
        </div></div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  document.getElementById('main').innerHTML = html;
}

function renderLinkRowEdit(key, n, li, lk) {
  return `<div class="link-row" data-li="${li}">
    <input type="text" placeholder="ラベル" value="${escA(lk.label||'')}"
      oninput="window._editData['${key}'][${n}].links[${li}].label=this.value" />
    <input type="url" placeholder="URL を貼り付け" value="${escA(lk.url||'')}"
      oninput="window._editData['${key}'][${n}].links[${li}].url=this.value" />
    <button class="btn-del" onclick="delLinkEdit('${key}',${n},${li})">✕</button>
  </div>`;
}

function toggleEditRound(stateKey, header) {
  const body = document.getElementById('erb-' + stateKey);
  const isOpen = body.classList.toggle('open');
  editOpenState[stateKey] = isOpen;
  header.querySelector('.chevron').classList.toggle('open', isOpen);
}

function setCat(key, n, val) {
  if (!window._editData[key]) window._editData[key] = {};
  if (!window._editData[key][n]) window._editData[key][n] = { links:[] };
  window._editData[key][n].category = val;
}

function addLinkEdit(key, n) {
  if (!window._editData[key]) window._editData[key] = {};
  if (!window._editData[key][n]) window._editData[key][n] = { links:[] };
  if (!window._editData[key][n].links) window._editData[key][n].links = [];
  const li = window._editData[key][n].links.length;
  window._editData[key][n].links.push({ label:'', url:'' });
  document.getElementById(`links-edit-${key}-${n}`).insertAdjacentHTML('beforeend',
    renderLinkRowEdit(key, n, li, { label:'', url:'' }));
}

function delLinkEdit(key, n, li) {
  window._editData[key][n].links.splice(li, 1);
  // rerender just that section
  const container = document.getElementById(`links-edit-${key}-${n}`);
  let html = '';
  window._editData[key][n].links.forEach((lk, i) => { html += renderLinkRowEdit(key, n, i, lk); });
  container.innerHTML = html;
}

async function saveAll() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    await window._set(window._editData);
    showToast('✅ クラウドに保存しました！');
    window._data = deepClone(window._editData);
  } catch(e) {
    showToast('❌ 保存に失敗しました');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = '💾 クラウドに保存';
}

function cancelEdit() {
  if (!confirm('編集内容を破棄しますか？')) return;
  switchTop('day');
}

// ===== UTILS =====
function getLinkIcon(url) {
  if (!url) return '🔗';
  if (url.includes('notebooklm')) return '📓';
  if (url.includes('docs.google')) return '📄';
  if (url.includes('youtube')||url.includes('youtu.be')) return '▶️';
  if (url.includes('drive.google')) return '📁';
  return '🔗';
}
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s){ return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function toggleGroup(id, btn) {
  const body = document.getElementById(id);
  const isOpen = body.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.querySelector('.grp-chevron').textContent = isOpen ? '▲' : '▼';
}

window._currentView = renderDayView;

// ===== LINK PASSWORD =====
let _pendingUrl = null;

function openLinkWithPw(url, e) {
  e.preventDefault();
  if (sessionStorage.getItem('auth') === '1') {
    window.open(url, '_blank', 'noopener');
    return;
  }
  _pendingUrl = url;
  document.getElementById('pwModal').style.display = 'flex';
  setTimeout(() => document.getElementById('pwModalInput').focus(), 50);
}

function submitPw() {
  const val = document.getElementById('pwModalInput').value;
  if (val === 'g') {
    sessionStorage.setItem('auth', '1');
    closePwModal();
    if (_pendingUrl) window.open(_pendingUrl, '_blank', 'noopener');
    _pendingUrl = null;
  } else {
    document.getElementById('pwModalErr').style.display = 'block';
    document.getElementById('pwModalInput').value = '';
    document.getElementById('pwModalInput').focus();
  }
}

function closePwModal() {
  document.getElementById('pwModal').style.display = 'none';
  document.getElementById('pwModalInput').value = '';
  document.getElementById('pwModalErr').style.display = 'none';
  _pendingUrl = null;
}


</script>

<!-- パスワードモーダル -->
<div class="pw-modal-bg" id="pwModal" style="display:none;">
  <div class="pw-modal">
    <div class="pw-modal-title">🔑 パスワードを入力</div>
    <div class="pw-modal-sub">リンクを開くには認証が必要です</div>
    <div class="pw-modal-row">
      <input type="password" id="pwModalInput" placeholder="パスワード"
        onkeydown="if(event.key==='Enter')submitPw()" />
      <button class="pw-modal-btn" onclick="submitPw()">→</button>
    </div>
    <div class="pw-modal-err" id="pwModalErr">パスワードが違います</div>
    <button class="pw-modal-cancel" onclick="closePwModal()">キャンセル</button>
  </div>
</div>
